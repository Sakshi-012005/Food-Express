<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FoodExpress - Pro Interactive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
     <nav id="navbar" style="display:none;">
        <div class="logo">🍔 FoodExpress</div>
        <div class="hamburger" onclick="toggleMobileMenu()">☰</div>
        <ul class="nav-links">
            <li><a href="#" onclick="showSection('home')">Home</a></li>
            <li><a href="#" onclick="showSection('menu')">Menu</a></li>
            <li><a href="#" onclick="showSection('help')">Help</a></li>
            <li><a href="#" onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</a></li>
        </ul>
    </nav>


    <section id="login" class="section active">
    <div class="login-card">
        <h1>sign in</h1>

        <form onsubmit="loginUser(event)">
            <label>Username</label>
            <input type="text" id="login-username" required>

            <label>Password</label>
            <input type="password" id="login-password" required>

            <button type="submit">LOGIN</button>
        </form>
    </div>
</section>


    <!-- Sections -->
    <section id="home" class="section">
        <div class="home-content">
            <h1>Welcome to FoodExpress!</h1>
            <p>Delicious food delivered to your doorstep.</p>
            <button onclick="showSection('menu')" class="order-btn">Order Now 🍕</button>
        </div>
    </section>

    <section id="menu" class="section">
        <h1>Our Menu</h1>
        <div class="menu-controls">
            <input type="text" id="search" placeholder="Search for food..." onkeyup="searchFood()">
            <div class="category-buttons">
                <button onclick="filterCategory('all')">All</button>
                <button onclick="filterCategory('burger')">Burgers</button>
                <button onclick="filterCategory('pizza')">Pizza</button>
                <button onclick="filterCategory('drinks')">Drinks</button>
                <button onclick="filterCategory('dessert')">Desserts</button>
                <button onclick="filterCategory('food')">Food</button>
            </div>
        </div>
        <div class="food-container" id="food-container">
            <!-- Dynamic food items will be inserted here -->
        </div>
    </section>

    <section id="help" class="section">
        <h2>Help & Info</h2>
        <p>Contact us at <strong>support@foodexpress.com</strong></p>
        <p>Phone: +1 234 567 890</p>
        <p>Delivery times: 30-45 minutes</p>
    </section>

    <section id="delivery" class="section">
        <div class="delivery-form">
            <h2>Delivery Details</h2>
            <form onsubmit="placeOrder(event)">
                <input type="text" id="customer-name" placeholder="Full Name" required>
                <input type="text" id="customer-phone" placeholder="Phone Number" required>
                <textarea id="customer-address" placeholder="Delivery Address" required></textarea>
                <button type="submit">Confirm Order ✅</button>
                <button type="button" onclick="showSection('menu')">⬅ Back to Menu</button>
            </form>
        </div>
    </section>

    <!-- Cart Sidebar with overlay -->
    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart" id="cart">
        <h2>Your Cart</h2>
        <ul id="cart-items"></ul>
        <h3>Total: $<span id="total">0</span></h3>
        <button class="checkout" onclick="checkout()">Checkout</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
